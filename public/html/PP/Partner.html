<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <!-- Load the PayPal JS SDK with your PayPal Client ID (buyer country is not included for Production)-->
    <script src="https://www.paypal.com/sdk/js?client-id=AVGqIc8hFJ_fclr98apdzfSRMvn-G3RRRAqeSMbFP1lnDG-SghtB2sXeMEmDB4lKtsuF1Onn-CquEc_5&buyer-country=GB&currency=GBP&components=buttons&enable-funding=paylater,card"></script>
    <!-- Load Adyen Scripts -->
    <link rel="stylesheet" href="https://checkoutshopper-test.adyen.com/checkoutshopper/sdk/5.61.0/adyen.css" />
    <script src="https://checkoutshopper-test.adyen.com/checkoutshopper/sdk/5.61.0/adyen.js"></script>

    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/scripts/PP/partnerScripts.js" defer></script>
    <title>Liv's Site</title>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-logo"></div>
      <ul class="nav-list" >
        <a class="nav-links"  href="../../index.html">Home</a>
        <a class="nav-links"  href="Advanced.html"> Advanced</a>
        <a class="nav-links"  href=""></a>
        <a class="nav-links"  href=""></a>
      </ul>
    </nav>

    <div class="box" id="demo-frame">
      <h2>Checkout with Adyen</h2>
      <main class="page">
        <div class="checkout-card" id="checkout-message"> 
          <div class="heading">CHECKOUT</div>
          
          <div class="basket">
            <img class="item-image" src="/images/jumper.jpeg"> 
            <div class="purchase">
              <div class="item-text">Cashmere Knitted Jumper</div>
              <div class="item-subtext">S | Black</div>
            </div>
            <div class="purchase-price">
              <div class="item-price">£100</div>
            </div>
          </div>
          <h1>Card Payment</h1>
          

          <div id="paypal-container"></div>
          <div
              data-pp-message
              data-pp-style-layout="text"
              data-pp-style-logo-type="inline"
              data-pp-style-text-color="black"
              data-pp-style-text-size="12"
              data-pp-amount=ENTER_VALUE_HERE
              data-pp-placement=product>
          </div>
          <p id="result-message"></p>
        </div>
      </main>
    </div>
  </body>
</html>
