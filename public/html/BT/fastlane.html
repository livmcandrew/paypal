<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
    <script src="https://js.braintreegateway.com/web/3.137.0/js/three-d-secure.min.js"></script>
     <!-- Braintree core client -->
    <script src="https://js.braintreegateway.com/web/3.137.0/js/client.min.js"></script>
    <!-- PayPal Checkout for Braintree -->
    <script src="https://js.braintreegateway.com/web/3.137.0/js/paypal-checkout.min.js"></script>
    <!-- FastLane Braintree -->
    <script src="https://js.braintreegateway.com/web/3.137.0/js/client.min.js"></script>
    <script src="https://js.braintreegateway.com/web/3.137.0/js/fastlane.js"></script>
    <script src="https://js.braintreegateway.com/web/3.137.0/js/data-collector.min.js"></script>

    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/scripts/BT/FLScripts.js" defer></script>
    <title>Liv's Site</title>
  </head>
  
  <nav class="navbar">
      <div class="nav-logo"></div>
      <ul class="nav-list" >
        <a class="nav-links"  href="../../index.html">Home</a>
        <a class="nav-links"  href="dropInUI.html"> Drop-In UI</a>
        <a class="nav-links"  href="VaultingNewCust.html">Vaulting</a>
        <a class="nav-links"  href="hostedFields.html"> Hosted Fields</a>
      </ul>
  </nav>
  <body>
    <div class="box" id="demo-frame">
      <h2>Checkout with Fast Lane</h2>
      <main class="page">
      <div class="checkout-card" id="checkout-message"> 
      <div class="heading">CHECKOUT</div>
      
      <div class="basket">
        <img class="item-image" src="/images/jumper.jpeg"> 
        <div class="purchase">
          <div class="item-text">Cashmere Knitted Jumper</div>
          <div class="item-subtext">S | Black</div>
        </div>
        <div class="purchase-price">
          <div class="item-price">£100</div>
        </div>
      </div>
  
          <div class="payment-actions">
            
          </div>
          <form id="FL-form" class="FL-form">
            
            <!-- Email Input-->
            <section id="customer-input">
              <b>Enter your email</b><br><br>
              <input class="email-button" id="email" name="email" type="email" required><br>
              <!-- FastLane Image -->
              <div id="watermark-container" class="FL-image">
                <img src="https://www.paypalobjects.com/fastlane-v1/assets/fastlane-with-tooltip_en_sm_light.0808.svg" />
              </div><br>
              <button id="email-submit-button" type="button" class="pay-button"> Continue</button>
            </section>

            <!-- Email Found-->
            <section id="customer" hidden>
              <div class="FL-heading">Customer</div><br><br>
              <div class="summary"></div><br><br>
              <hr>
            </section>
          
            <!-- Shipping -->
            <section id="shipping" hidden>
              <div class="FL-heading">Shipping Details</div>
              <br>
              <button id="edit-shipping-button" type="button" class="edit-button"> 
                <span class="button-icon"></span>Edit
              </button>
              <div class="summary"></div>

              <!--- Shipping info For New customer -->
              <fieldset hidden>
                <span>
                  <input id="shipping-required-checkbox" name="shipping-required" type="checkbox" checked />
                  <label for="shipping-required-checkbox" class="checkbox-label">
                    This purchase requires shipping
                  </label>
                </span>
                <div class="form-row">
                  <div class="form-group">
                    <input required id="given-name" maxlength="255" name="given-name" placeholder="First name"
                      autocomplete="given-name" />
                    <label for="given-name" class="FL-label">First Name</label>
                  </div>
                  <div class="form-group">
                    <input required id="family-name" maxlength="255" name="family-name" placeholder="Last name"
                      autocomplete="family-name" />
                    <label for="family-name" class="FL-label">Last Name</label>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <input id="company" name="company" maxlength="255" placeholder="Company name (optional)"
                      autocomplete="organization" />
                    <label for="company" class="FL-label">
                      Company name (optional)
                    </label>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <input required id="shipping-address-line1" maxlength="255" name="shipping-address-line1"
                      placeholder="Street address" autocomplete="address-line1" placeholder="Address Line 1" />
                    <label for="shipping-address-line1" class="FL-label">
                      Address Line 1
                    </label>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <input id="shipping-address-line2" maxlength="255" name="shipping-address-line2"
                      placeholder="Apt., ste., bldg. (optional)" autocomplete="address-line2" />
                    <label for="shipping-address-line2" class="FL-label">
                      Apt., ste, bldg. (optional)
                    </label>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <input required id="shipping-address-level2" maxlength="255" name="shipping-address-level2"
                      autocomplete="address-level2" placeholder="City" />
                    <label for="shipping-address-level2" class="FL-label">City</label>
                  </div>
                  <div class="form-group">
                    <input required id="address-level1" maxlength="255" name="shipping-address-level1" placeholder="State"
                      autocomplete="address-level1" />
                    <label for="address-level1" class="FL-label">State</label>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <input required pattern="\d{5}(-\d{4})?"
                      title="The ZIP code must have the one of the following formats: 12345 or 12345-6789"
                      id="shipping-postal-code" name="shipping-postal-code" placeholder="ZIP code" autocomplete="postal-code" />
                    <label for="shipping-postal-code" class="FL-label">ZIP Code</label>
                  </div>
                  <div class="form-group">
                    <input required pattern="US" minlength="2" maxlength="2" title="Currently only available to the US"
                      id="shipping-country" name="shipping-country" placeholder="Country" autocomplete="country" />
                    <label for="shipping-country" class="FL-label">
                      Country (eg. US, UK)
                    </label>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <input pattern="([0-9]{1,3})?" title="Please enter a valid country calling code with 1 to 3 digits"
                      minlength="1" maxlength="3" id="tel-country-code" name="tel-country-code"
                      placeholder="Country calling code" autocomplete="tel-country-code" />
                    <label for="tel-country-code" class="FL-label">
                      Country calling code
                    </label>
                  </div>
                  <div class="form-group">
                    <input pattern="([0-9]{10})?"
                      title="Please enter a valid US phone number like (123) 456-7890, type only numbers" id="tel-national"
                      name="tel-national" type="tel" placeholder="Phone number" autocomplete="tel-national" />
                    <label for="tel-national" class="FL-label">Phone Number</label>
                  </div>
                </div>
                <button id="shipping-submit-button" type="button" class="submit-button">
                Continue
              </button>
              <br>
              </fieldset>
              <hr>
            </section>

            <!-- Payment-->
             <section id="payment" hidden>
              <br><div class="FL-heading">Payment Method</div><br>
               <button id="edit-payment-button" type="button" class="edit-button"> 
                <span class="button-icon"></span>Edit
              </button>
              <img src="https://www.paypalobjects.com/fastlane-v1/assets/cc_visa_light.0a3a.svg" alt="VISA credit card" id="visa-image" style="height:45px;width:30px;float:left;padding-right:10px;" hidden>  
              <div id="selected-card" class="summary" style="width:40%;padding-top:10px;"></div><br>
              <!-- FastLane Image -->
              <div id="watermark-container">
                <img src="https://www.paypalobjects.com/fastlane-v1/assets/fastlane-with-tooltip_en_sm_light.0808.svg" />
              </div><br><br>
              <button id="pay-submit-button" type="button" class="pay-button"> Pay</button><br><br>
               <button id="cancel-submit-button" type="button" class="pay-button"> Cancel </button><br><br>
            </section>

            <!-- Completed Payment-->
            <section id="complete" hidden>
              <br><div class="FL-heading">Purchase successfully complete</div><br><br>
              <div class="summary"></div><br><br>
              <button id="exit-submit-button" type="button" class="pay-button"> Make Another Payment</button><br><br>
            </section>


          </form>
          
          <div id="result-message"> </div>
        </div>
      </main>
    </div>
  </body>
</html>
